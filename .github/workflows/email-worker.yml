name: Process Email Job

on:
  repository_dispatch:
    types: [process-email-job]
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Call worker every 10 seconds until job completes
        env:
          JOB_ID: ${{ github.event.client_payload.jobId }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Starting to process job $JOB_ID"

          BASE_URL="https://ooal.theiredefoundation.org"

          while true; do
            curl -X POST "$BASE_URL/api/email/worker?jobId=$JOB_ID" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              --fail || echo "Worker call failed, continuing..."

            STATUS=$(curl -s "$BASE_URL/api/email/jobs/$JOB_ID" \
              -H "Authorization: Bearer $CRON_SECRET" \
              | jq -r '.status')

            echo "Job status: $STATUS"

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              echo "Job finished with status $STATUS"
              break
            fi

            sleep 60
          done
